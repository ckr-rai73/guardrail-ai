# Default values for guardrail-cloud-connector
# Override these in your custom values file or via --set flags.

replicaCount: 2

image:
  repository: guardrail/cloud-connector
  tag: "latest"
  pullPolicy: IfNotPresent

# Cloud provider: aws | azure | gcp
cloudProvider: "aws"

# Guardrail Core API connection
guardrail:
  apiUrl: "http://guardrail-core:8080"
  apiKey: ""                            # set via --set or external secret

# AWS-specific settings
aws:
  region: "us-east-1"
  marketplaceProductCode: ""

# Azure-specific settings
azure:
  resourceId: ""
  # DefaultAzureCredential is used automatically when running in Azure
  # Set AZURE_MARKETPLACE_ACCESS_TOKEN as fallback if needed
  accessToken: ""

# GCP-specific settings
gcp:
  serviceName: ""
  serviceAccountJson: ""                # base64-encoded SA key JSON

# Service configuration
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations: {}

# Resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pod annotations (e.g. for Prometheus scraping)
podAnnotations: {}

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
