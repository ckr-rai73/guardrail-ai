name: Adversarial Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Specific test file to run (e.g., backend/adversarial_test_phase102_generation.py). Leave blank to run all.'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn mcp langgraph google-genai supabase pytest httpx

    - name: Run adversarial tests
      working-directory: .
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'dummy_key' }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'dummy_url' }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'dummy_key' }}
      run: |
        echo "Running adversarial tests sequentially..."
        failed=0
        
        # Loop through all adversarial test scripts in the backend directory
        if [ -n "${{ github.event.inputs.test_file }}" ]; then
          echo "Running specific test: ${{ github.event.inputs.test_file }}"
          if python "${{ github.event.inputs.test_file }}"; then
            echo "[PASS] ${{ github.event.inputs.test_file }}"
          else
            echo "[FAIL] ${{ github.event.inputs.test_file }}"
            failed=1
          fi
        else
          for test_file in backend/adversarial_test_*.py; do
            if [ -f "$test_file" ]; then
              echo "=================================================="
              echo "Running $test_file..."
              echo "=================================================="
              if python "$test_file"; then
                echo "[PASS] $test_file"
              else
                echo "[FAIL] $test_file"
                failed=1
              fi
              echo ""
            fi
          done
          
          # Also run committee test
          echo "=================================================="
          echo "Running backend/adversarial_committee_test.py..."
          echo "=================================================="
          if python backend/adversarial_committee_test.py; then
            echo "[PASS] backend/adversarial_committee_test.py"
          else
            echo "[FAIL] backend/adversarial_committee_test.py"
            failed=1
          fi
        fi
        
        # Determine overall result
        if [ $failed -ne 0 ]; then
          echo "One or more adversarial tests failed!"
          exit 1
        else
          echo "All adversarial tests passed successfully!"
        fi
