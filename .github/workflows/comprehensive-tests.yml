name: Comprehensive Adversarial Tests (Phases 1-116)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-all-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure pip is updated
        run: |
          python -m pip install --upgrade pip

      - name: Run comprehensive test suite
        id: test_run
        # The script `run_all_tests.py` installs required dependencies internally.
        # We use `tee` to capture the output for the artifact while still displaying it in the GitHub Actions UI.
        run: |
          python run_all_tests.py | tee test_output.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-test-results
          path: test_output.log
          retention-days: 14
